name: Demoapi CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py seed_atlas.py

      - name: Seed generator smoke test
        run: python -c "from app import build_demo_dataset; d=build_demo_dataset(); assert len(d['products']) > 2000 and len(d['inventory_rows']) > 10000; print('ok')"

      - name: Build Docker image
        run: docker build -t demoapi:ci .
